<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Studio</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="frontend/css/styles.css">
    <link rel="stylesheet" href="frontend/css/themes.css">
    <link rel="stylesheet" href="frontend/css/components.css">
</head>
<body class="theme-dark accent-blue font-medium">
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="avatar" id="avatar">?</div>
            <div class="user-info">
                <div class="user-name" id="userName">Загрузка...</div>
                <div class="user-role" id="userRole">...</div>
            </div>
        </div>
        
        <!-- Content -->
        <div class="content" id="content">
            <!-- Tasks Screen -->
            <div class="screen active" id="screen-tasks">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>Загрузка задач...</div>
                </div>
            </div>
            
            <!-- Finances Screen -->
            <div class="screen" id="screen-finances">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>Загрузка финансов...</div>
                </div>
            </div>
            
            <!-- Settings Screen -->
            <div class="screen" id="screen-settings">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>Загрузка настроек...</div>
                </div>
            </div>
        </div>
        
        <!-- Navbar -->
        <div class="navbar">
            <div class="nav-item active" data-screen="tasks">
                <div class="nav-icon">📋</div>
                <div>Задачи</div>
            </div>
            <div class="nav-item" data-screen="finances">
                <div class="nav-icon">💰</div>
                <div>Финансы</div>
            </div>
            <div class="nav-item" data-screen="settings">
                <div class="nav-icon">⚙️</div>
                <div>Настройки</div>
            </div>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script src="frontend/js/api.js"></script>
    <script src="frontend/js/tasks.js"></script>
    <script src="frontend/js/finances.js"></script>
    <script src="frontend/js/settings.js"></script>
    <script src="frontend/js/app.js"></script>
</body>
</html>
